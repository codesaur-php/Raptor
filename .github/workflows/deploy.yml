# ======================================================================
# GitHub Actions -> Auto Deploy (CI workflow хамт ашиглах)
# ======================================================================
#
# CI workflow (ci.yml) амжилттай дууссаны дараа автомат deploy хийнэ.
# Тохируулсан secrets/variables-аас хамаарч зөв арга автомат сонгогдоно.
#
# Шаардлага:
#   - .github/workflows/ci.yml байх ёстой (код чанарын шалгалт тэнд хийгдэнэ)
#   - CI амжилтгүй бол deploy хийгдэхгүй
#   - Аль ч deploy тохируулаагүй бол бүгд алгасна (developer clone)
#
# ----------------------------------------------------------------------
# A) FTP Deploy
# ----------------------------------------------------------------------
#   FTP хандалттай дурын серверт (shared hosting, VPS, dedicated) ажиллана.
#
#   GitHub repo -> Settings -> Secrets and variables -> Actions -> Secrets:
#     FTP_HOST       - Серверийн FTP хаяг (жишээ: ftp.example.com)
#     FTP_USERNAME   - FTP хэрэглэгчийн нэр
#     FTP_PASSWORD   - FTP нууц үг
#     FTP_SERVER_DIR - Серверийн зорьсон хавтас (жишээ: /)
#
# ----------------------------------------------------------------------
# B) SSH Deploy
# ----------------------------------------------------------------------
#   SSH хандалттай Linux серверт (VPS, cloud VM, dedicated) ажиллана.
#
#   GitHub repo -> Settings -> Secrets and variables -> Actions -> Secrets:
#     SSH_HOST       - Серверийн хаяг (жишээ: example.com эсвэл 1.2.3.4)
#     SSH_USERNAME   - SSH хэрэглэгчийн нэр
#     SSH_KEY        - SSH private key (id_rsa агуулга бүтнээр)
#     SSH_DEPLOY_DIR - Серверийн зорьсон хавтас (жишээ: /var/www/myproject)
#     SSH_PORT       - (заавал биш) SSH порт, анхдагч: 22
#
# ----------------------------------------------------------------------
# C) Windows Self-hosted Runner Deploy
# ----------------------------------------------------------------------
#   Windows Server дээр GitHub Actions self-hosted runner суулгах:
#     GitHub repo -> Settings -> Actions -> Runners -> New self-hosted runner
#     1. Windows сонгоно
#     2. Заавар дагаж runner татаж суулгана
#     3. Runner-г Windows service болгон бүртгэнэ:
#        ./svc.sh install
#        ./svc.sh start
#     4. Runner дээр PHP, Composer PATH-д байх ёстой
#
#   GitHub repo -> Settings -> Secrets and variables -> Actions -> Variables:
#     DEPLOY_PATH - Серверийн project хавтас
#                   (жишээ: C:\xampp\htdocs\myproject)
#
# Тэмдэглэл:
#   - .env файл серверт гараар үүсгэж тохируулна (deploy хийгдэхгүй)
#   - Runtime хавтаснууд (cache/, logs/, protected/, public_html/public/,
#     database/migrations/) guard файлуудтайгаа (.htaccess г.м.) deploy
#     хийгдэж серверт үүснэ, харин доторх runtime агуулгад нь (кэш, лог,
#     upload файл, migration SQL) deploy халдахгүй - устгахгүй, дарахгүй.
#     Гурван арга үүнийг өөр өөр механизмаар хангадаг тул exclude
#     жагсаалтууд нь хоорондоо ижил биш байгаа нь зориудынх.
#   - Олон deploy зэрэг тохируулж болно (жишээ: staging = Windows,
#     production = SSH) - тус тусдаа ажиллана
# ======================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  # ====================================================================
  # Pre-check: Deploy target-ууд тохируулсан эсэхийг шалгах
  # ====================================================================
  check-targets:
    name: Detect deploy targets
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      ftp: ${{ steps.check.outputs.ftp }}
      ssh: ${{ steps.check.outputs.ssh }}
    steps:
      - name: Check deploy secrets
        id: check
        run: |
          if [ -n "${{ secrets.FTP_HOST }}" ]; then
            echo "ftp=true" >> "$GITHUB_OUTPUT"
          else
            echo "ftp=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ secrets.SSH_HOST }}" ]; then
            echo "ssh=true" >> "$GITHUB_OUTPUT"
          else
            echo "ssh=false" >> "$GITHUB_OUTPUT"
          fi

  # ====================================================================
  # A) FTP Deploy
  # ====================================================================
  ftp:
    name: Deploy via FTP
    needs: check-targets
    runs-on: ubuntu-latest
    if: ${{ needs.check-targets.outputs.ftp == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, intl, pdo_mysql

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # Энэ action state-file-д үндэслэн ажилладаг: өөрөө upload хийгээгүй
      # (сервер дээр үүссэн) файлыг хэзээ ч устгадаггүй. Тиймээс runtime
      # хавтаснуудыг (cache/, logs/, protected/ г.м.) энд exclude хийх
      # шаардлагагүй - хавтас нь .htaccess-тэйгээ серверт очиж үүснэ,
      # доторх runtime агуулгад нь халдахгүй.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/docs/**
            **/tests/**
            **/.env*
            **/nbproject/**
            **/phpunit.xml

  # ====================================================================
  # B) SSH Deploy
  # ====================================================================
  ssh:
    name: Deploy via SSH
    needs: check-targets
    runs-on: ubuntu-latest
    if: ${{ needs.check-targets.outputs.ssh == 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, intl, pdo_mysql

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      # Энэ action-д "exclude" гэдэг input байдаггүй тул бүх шүүлтүүр
      # switches дотор rsync-ийн өөрийнх нь --include/--exclude хэлбэрээр
      # явна. rsync-д эхэлж таарсан дүрэм ялдаг тул runtime хавтаснуудын
      # guard файлын include нь агуулгын exclude-ээсээ өмнө байх ёстой.
      # "--exclude=/x/*" хэлбэр (эхний / нь transfer root) нь хавтсыг
      # өөрийг нь серверт үүсгэж, доторх агуулгыг нь transfer болон
      # --delete хоёуланд нь хамааруулахгүй орхино (--delete нь excluded
      # файлыг устгадаггүй).
      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: >-
            -avz --delete
            --include=/cache/.htaccess
            --include=/logs/.htaccess
            --include=/protected/.htaccess
            --include=/public_html/public/.htaccess
            --include=/database/migrations/.gitkeep
            --include=/database/migrations/README.md
            --exclude=/cache/*
            --exclude=/logs/*
            --exclude=/protected/*
            --exclude=/public_html/public/*
            --exclude=/database/migrations/*
            --exclude=.git*
            --exclude=/.github
            --exclude=/docs
            --exclude=/tests
            --exclude=.env*
            --exclude=/nbproject
            --exclude=/phpunit.xml
            --exclude=error_log
          path: ./
          remote_path: ${{ secrets.SSH_DEPLOY_DIR }}/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT || 22 }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Post-deploy commands
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || 22 }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.SSH_DEPLOY_DIR }}
            composer dump-autoload --optimize --no-interaction

  # ====================================================================
  # C) Windows Self-hosted Runner Deploy
  # ====================================================================
  windows-server:
    name: Deploy to Windows Server
    runs-on: [self-hosted, windows]
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_PATH != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Runtime хавтаснуудыг (cache, logs, protected, public_html\public,
      # database\migrations) /XD-д эх болон зорьсон талын бүтэн замаар нь
      # хослуулж өгнө: эх талынх нь transfer-ээс, зорьсон талынх нь /MIR-ийн
      # устгалтаас хамгаална. Нүцгэн нэр ашиглаж болохгүй - robocopy нэрээр
      # мод даяар таардаг тул application\dashboard\protected модулийг хамт
      # хасчихна. Дараагийн жижиг robocopy-нууд (/MIR-гүй, юу ч устгадаггүй)
      # guard файлуудыг хуулж хавтаснуудыг серверт үүсгэнэ.
      - name: Sync files to deploy path
        shell: cmd
        run: |
          robocopy "%GITHUB_WORKSPACE%" "${{ vars.DEPLOY_PATH }}" /MIR /XD .git .github docs tests nbproject "%GITHUB_WORKSPACE%\cache" "%GITHUB_WORKSPACE%\logs" "%GITHUB_WORKSPACE%\protected" "%GITHUB_WORKSPACE%\public_html\public" "%GITHUB_WORKSPACE%\database\migrations" "${{ vars.DEPLOY_PATH }}\cache" "${{ vars.DEPLOY_PATH }}\logs" "${{ vars.DEPLOY_PATH }}\protected" "${{ vars.DEPLOY_PATH }}\public_html\public" "${{ vars.DEPLOY_PATH }}\database\migrations" /XF .env .env.* phpunit.xml error_log /NFL /NDL /NJH /NJS /R:3 /W:5
          if %ERRORLEVEL% GTR 7 exit /b 1
          robocopy "%GITHUB_WORKSPACE%\cache" "${{ vars.DEPLOY_PATH }}\cache" .htaccess /NJH /NJS /R:3 /W:5
          if %ERRORLEVEL% GTR 7 exit /b 1
          robocopy "%GITHUB_WORKSPACE%\logs" "${{ vars.DEPLOY_PATH }}\logs" .htaccess /NJH /NJS /R:3 /W:5
          if %ERRORLEVEL% GTR 7 exit /b 1
          robocopy "%GITHUB_WORKSPACE%\protected" "${{ vars.DEPLOY_PATH }}\protected" .htaccess /NJH /NJS /R:3 /W:5
          if %ERRORLEVEL% GTR 7 exit /b 1
          robocopy "%GITHUB_WORKSPACE%\public_html\public" "${{ vars.DEPLOY_PATH }}\public_html\public" .htaccess /NJH /NJS /R:3 /W:5
          if %ERRORLEVEL% GTR 7 exit /b 1
          robocopy "%GITHUB_WORKSPACE%\database\migrations" "${{ vars.DEPLOY_PATH }}\database\migrations" .gitkeep README.md /NJH /NJS /R:3 /W:5
          if %ERRORLEVEL% GTR 7 exit /b 1
          exit /b 0

      - name: Install/update production dependencies
        shell: cmd
        working-directory: ${{ vars.DEPLOY_PATH }}
        run: |
          composer update --no-dev --optimize-autoloader --no-interaction
          composer dump-autoload --optimize
