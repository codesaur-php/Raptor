# ======================================================================
# GitHub Actions -> cPanel FTP Deploy (CI workflow хамт ашиглах)
# ======================================================================
#
# CI workflow (ci.yml) амжилттай дууссаны дараа cPanel сервер рүү
# FTP-ээр автомат deploy хийнэ.
#
# Шаардлага:
#   - .github/workflows/ci.yml байх ёстой (код чанарын шалгалт тэнд хийгдэнэ)
#   - CI амжилтгүй бол deploy хийгдэхгүй
#
# Тохируулах:
#   GitHub repo -> Settings -> Secrets and variables -> Actions:
#     FTP_HOST       - cPanel серверийн FTP хаяг (жишээ: ftp.example.com)
#     FTP_USERNAME   - cPanel FTP хэрэглэгчийн нэр
#     FTP_PASSWORD   - cPanel FTP нууц үг
#     FTP_SERVER_DIR - Серверийн зорьсон хавтас (жишээ: /)
#
# Хэрэглээ:
#   1. .github/workflows/ci.yml байгаа эсэхийг шалгана
#   2. Энэ файлыг .github/workflows/deploy.yml руу хуулна
#   3. GitHub Secrets-д FTP мэдээллээ оруулна
#
# Тэмдэглэл:
#   - .env файл серверт гараар үүсгэж тохируулна (deploy хийгдэхгүй)
#   - logs/ хавтас серверт автомат үүсдэг, deploy хийх шаардлагагүй
#   - vendor/ хавтас серверт composer install хийж үүсгэнэ
#     эсвэл локалаар --no-dev горимоор build хийж deploy хийнэ
# ======================================================================

name: Deploy to cPanel

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: gd, intl, pdo_mysql

      - name: Install production dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/docs/**
            **/tests/**
            **/.env*
            **/logs/**
            **/nbproject/**
            **/private/**
            **/phpunit.xml
