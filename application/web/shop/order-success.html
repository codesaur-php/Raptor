<div class="container mt-4" style="max-width:600px">
    <div class="text-center py-5">
        <i class="bi bi-check-circle text-success" style="font-size:4rem"></i>
        <h3 class="mt-3">
            {{ 'order-submitted'|text }}
        </h3>
        <p class="text-muted">
            {{ 'order-thank-you'|text|format(customer_name) }}
        </p>
        {% if product_title %}
            <p class="text-muted">
                <i class="bi bi-box2-heart me-1"></i>{{ product_title }}
            </p>
        {% endif %}
        <a href="{{ 'home'|link }}" class="btn btn-outline-primary mt-3">
            <i class="bi bi-house me-1"></i>{{ 'back-to-home'|text }}
        </a>
    </div>
</div>
