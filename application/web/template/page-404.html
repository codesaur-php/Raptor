<!-- Variables: title, code, message -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{{ title }} {{ code }}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <style>
            body {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                margin: 0;
            }
            #content {
                flex: 1;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <header class="bg-dark text-white py-4 shadow-sm">
            <div class="container-lg text-center">
                <h1 class="display-4 fw-bold mb-1">{{ code }}</h1>
                <p class="mb-0 fs-5 text-white-50">{{ title }}</p>
            </div>
        </header>

        <!-- Content -->
        <div class="container-lg my-5" id="content">
            {{ message }}
        </div>

        <!-- Footer -->
        <footer class="bg-dark text-light py-4 mt-auto">
            <div class="container-lg text-center">
                <a class="text-white-50" href="javascript:window.location=window.location.origin">Raptor</a>
            </div>
        </footer>
    </body>
</html>
