<!--
    web-stats.html
    ------------------------------------------------------------------
    Dashboard-ийн вэб статистик, системийн лог статистик UI.
    home.html-ээс дуудагдана.

    Controller: Dashboard\Home\HomeController
    Routes:
      GET /dashboard/stats     -> stats()      (web_log)
      GET /dashboard/log-stats -> logStats()   (system *_log)
-->
<div id="statsLoading" class="text-center py-4">
    <span class="spinner-border spinner-border-sm me-1"></span> {{ 'loading-statistics'|text }}
</div>
<div id="statsContainer"></div>

<script>
    var locale = '{{ attribute(localization.language, localization.code).locale ?? "" }}' || 'en-US';
    var mn = locale.substring(0, 2) === 'mn';

    /**
     * Dashboard-ийн статистик мэдээллийг API-аас татах.
     */
    (function loadStats() {
        var loading = document.getElementById('statsLoading');

        Promise.all([
            fetch('{{ 'dashboard-stats'|link }}').then(function(r) {
                if (!r.ok) throw new Error('Stats: HTTP ' + r.status);
                return r.json();
            }),
            fetch('{{ 'dashboard-log-stats'|link }}').then(function(r) {
                if (!r.ok) throw new Error('Log stats: HTTP ' + r.status);
                return r.json();
            })
        ])
        .then(function(results) {
            var d = results[0];
            if (d.status === 'error') throw new Error(d.message || 'Unknown stats error');
            loading.style.display = 'none';
            renderDashboard(d, results[1]);
        })
        .catch(function(err) {
            loading.innerHTML = '<span class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i>' + err.message + '</span>';
            console.error('Stats error:', err);
        });
    })();

    /**
     * Статистик мэдээллийг DOM-д render хийх.
     */
    function renderDashboard(d, logData) {
        var c = document.getElementById('statsContainer');
        var t = {
            webStats:    mn ? 'Вэб хандалтын статистик' : 'Web Traffic Statistics',
            today:       mn ? 'Өнөөдөр' : 'Today',
            week7:       mn ? '7 хоног' : '7 days',
            month30:     mn ? '30 хоног' : '30 days',
            total:       mn ? 'Нийт хандалт' : 'Total visits',
            chart30:     mn ? 'Сүүлийн 30 хоногийн хандалт' : 'Last 30 days traffic',
            actionType:  mn ? 'Хандалтын төрөл' : 'Traffic by type',
            topIp:       mn ? 'Топ 10 IP хаяг' : 'Top 10 IP addresses',
            ipCol:       mn ? 'IP хаяг' : 'IP address',
            visits:      mn ? 'Хандалт' : 'Visits',
            topPages:    mn ? 'Топ 10 хуудас' : 'Top 10 pages',
            page:        mn ? 'Хуудас' : 'Page',
            topNews:     mn ? 'Топ 10 мэдээ' : 'Top 10 news',
            news:        mn ? 'Мэдээ' : 'News',
            topProducts: mn ? 'Топ 10 бүтээгдэхүүн' : 'Top 10 products',
            product:     mn ? 'Бүтээгдэхүүн' : 'Product',
            allTime:     mn ? 'Бүх цаг' : 'All time',
            topToday:    mn ? 'Өнөөдрийн топ 10' : 'Today\'s top 10',
            content:     mn ? 'Агуулга' : 'Content',
            sysLog:      mn ? 'Системийн лог статистик' : 'System Log Statistics',
            logTable:    mn ? 'Лог хүснэгт' : 'Log table',
            totalCol:    mn ? 'Нийт' : 'Total',
            lastEntry:   mn ? 'Сүүлийн бичлэг' : 'Last entry',
            noData:      mn ? 'Мэдээлэл байхгүй' : 'No data',
            topUa:       mn ? 'Топ 10 хөтөч (User Agent)' : 'Top 10 User Agents',
            uaCol:       mn ? 'User Agent' : 'User Agent',
            ordersTotal: mn ? 'Нийт захиалга' : 'Total orders',
            ordersNew:   mn ? 'Шинэ захиалга' : 'New orders'
        };
        var html =
            // ===== WEB LOG STATISTICS (дээр) =====
            '<div class="d-flex align-items-center mb-3">' +
                '<h5 class="mb-0"><i class="bi bi-globe me-2"></i>' + t.webStats + '</h5>' +
                (d.log_from ? '<span class="badge bg-body-secondary text-body border ms-3 fs-6 fw-normal px-3 py-2"><i class="bi bi-clock-history me-1"></i>' + d.log_from + ' -> ' + d.log_to + '</span>' : '') +
            '</div>' +
            // Stat Cards
            '<div class="row g-3 mb-4">' +
                statCard('bg-primary', 'bi-calendar-event', d.today, t.today) +
                statCard('bg-success', 'bi-calendar-week', d.week, t.week7) +
                statCard('bg-warning', 'bi-calendar-month', d.month, t.month30) +
                statCard('bg-info', 'bi-bar-chart-line', d.total, t.total) +
                statCard('bg-secondary', 'bi-bag-check', d.orders_total, t.ordersTotal) +
                statCard('bg-danger', 'bi-bag-plus', d.orders_new, t.ordersNew) +
            '</div>' +
            // Өнөөдрийн нэгдсэн top 10 (pages + news + products)
            '<div class="card border-0 shadow-sm mb-4">' +
                '<div class="card-header border-0 pt-3">' +
                    '<h6 class="mb-0"><i class="bi bi-calendar-event me-2"></i>' + t.topToday + '</h6>' +
                '</div>' +
                '<div class="card-body p-0">' + buildTable(['#', t.content, t.visits], mergeToday(d.top_pages_today, d.top_news_today, d.top_products_today), 'title', 'bg-primary') + '</div>' +
            '</div>' +
            // Area Chart
            '<div class="card border-0 shadow-sm mb-4">' +
                '<div class="card-header border-0 pt-3">' +
                    '<h6 class="mb-0"><i class="bi bi-graph-up me-2"></i>' + t.chart30 + '</h6>' +
                '</div>' +
                '<div class="card-body"><div id="areaChart"></div></div>' +
            '</div>' +
            // Pages + News + Products (1 row, col-lg-4)
            '<div class="row g-3 mb-4">' +
                '<div class="col-lg-4">' +
                    '<div class="card border-0 shadow-sm h-100">' +
                        '<div class="card-header border-0 pt-3 d-flex align-items-center">' +
                            '<h6 class="mb-0 me-auto"><i class="bi bi-file-earmark-text me-2"></i>' + t.topPages + '</h6>' +
                            '<ul class="nav nav-pills nav-pills-sm mb-0" role="tablist">' +
                                '<li class="nav-item"><a class="nav-link py-0 px-2 active" data-bs-toggle="pill" href="#pages_all">' + t.allTime + '</a></li>' +
                                '<li class="nav-item"><a class="nav-link py-0 px-2" data-bs-toggle="pill" href="#pages_week">' + t.week7 + '</a></li>' +
                            '</ul>' +
                        '</div>' +
                        '<div class="card-body p-0"><div class="tab-content">' +
                            '<div class="tab-pane fade show active" id="pages_all">' + buildTable(['#', t.page, t.visits], d.top_pages, 'title', 'bg-primary') + '</div>' +
                            '<div class="tab-pane fade" id="pages_week">' + buildTable(['#', t.page, t.visits], d.top_pages_week, 'title', 'bg-primary') + '</div>' +
                        '</div></div>' +
                    '</div>' +
                '</div>' +
                '<div class="col-lg-4">' +
                    '<div class="card border-0 shadow-sm h-100">' +
                        '<div class="card-header border-0 pt-3 d-flex align-items-center">' +
                            '<h6 class="mb-0 me-auto"><i class="bi bi-newspaper me-2"></i>' + t.topNews + '</h6>' +
                            '<ul class="nav nav-pills nav-pills-sm mb-0" role="tablist">' +
                                '<li class="nav-item"><a class="nav-link py-0 px-2 active" data-bs-toggle="pill" href="#news_all">' + t.allTime + '</a></li>' +
                                '<li class="nav-item"><a class="nav-link py-0 px-2" data-bs-toggle="pill" href="#news_week">' + t.week7 + '</a></li>' +
                            '</ul>' +
                        '</div>' +
                        '<div class="card-body p-0"><div class="tab-content">' +
                            '<div class="tab-pane fade show active" id="news_all">' + buildTable(['#', t.news, t.visits], d.top_news, 'title', 'bg-success') + '</div>' +
                            '<div class="tab-pane fade" id="news_week">' + buildTable(['#', t.news, t.visits], d.top_news_week, 'title', 'bg-success') + '</div>' +
                        '</div></div>' +
                    '</div>' +
                '</div>' +
                '<div class="col-lg-4">' +
                    '<div class="card border-0 shadow-sm h-100">' +
                        '<div class="card-header border-0 pt-3 d-flex align-items-center">' +
                            '<h6 class="mb-0 me-auto"><i class="bi bi-box2-heart me-2"></i>' + t.topProducts + '</h6>' +
                            '<ul class="nav nav-pills nav-pills-sm mb-0" role="tablist">' +
                                '<li class="nav-item"><a class="nav-link py-0 px-2 active" data-bs-toggle="pill" href="#products_all">' + t.allTime + '</a></li>' +
                                '<li class="nav-item"><a class="nav-link py-0 px-2" data-bs-toggle="pill" href="#products_week">' + t.week7 + '</a></li>' +
                            '</ul>' +
                        '</div>' +
                        '<div class="card-body p-0"><div class="tab-content">' +
                            '<div class="tab-pane fade show active" id="products_all">' + buildTable(['#', t.product, t.visits], d.top_products, 'title', 'bg-warning') + '</div>' +
                            '<div class="tab-pane fade" id="products_week">' + buildTable(['#', t.product, t.visits], d.top_products_week, 'title', 'bg-warning') + '</div>' +
                        '</div></div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
            // Donut + IPs + User Agents (1 row, col-lg-4)
            '<div class="row g-3 mb-4">' +
                '<div class="col-lg-4">' +
                    '<div class="card border-0 shadow-sm h-100">' +
                        '<div class="card-header border-0 pt-3">' +
                            '<h6 class="mb-0"><i class="bi bi-pie-chart me-2"></i>' + t.actionType + '</h6>' +
                        '</div>' +
                        '<div class="card-body d-flex align-items-center justify-content-center">' +
                            '<div id="donutChart" style="width:100%;min-height:300px"></div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="col-lg-4">' +
                    '<div class="card border-0 shadow-sm h-100">' +
                        '<div class="card-header border-0 pt-3">' +
                            '<h6 class="mb-0"><i class="bi bi-globe me-2"></i>' + t.topIp + '</h6>' +
                        '</div>' +
                        '<div class="card-body p-0">' + buildTable(['#', t.ipCol, t.visits], d.top_ips, 'ip', 'bg-secondary') + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="col-lg-4">' +
                    '<div class="card border-0 shadow-sm h-100">' +
                        '<div class="card-header border-0 pt-3">' +
                            '<h6 class="mb-0"><i class="bi bi-laptop me-2"></i>' + t.topUa + '</h6>' +
                        '</div>' +
                        '<div class="card-body p-0">' + buildTable(['#', t.uaCol, t.visits], d.top_uas, 'ua', 'bg-dark') + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';

        // ===== SYSTEM LOG STATISTICS (доор) =====
        if (logData && logData.status === 'success' && logData.logs && logData.logs.length > 0) {
            html += '<hr class="my-4">' +
                '<h5 class="mb-3"><i class="bi bi-list-stars me-2"></i>' + t.sysLog + '</h5>' +
                '<div class="table-responsive">' +
                '<table class="table table-sm table-hover table-striped shadow-sm">' +
                    '<thead class="table-dark">' +
                        '<tr>' +
                            '<th class="ps-3">' + t.logTable + '</th>' +
                            '<th class="text-end">' + t.today + '</th>' +
                            '<th class="text-end">' + t.week7 + '</th>' +
                            '<th class="text-end">' + t.totalCol + '</th>' +
                            '<th class="text-end pe-3">' + t.lastEntry + '</th>' +
                        '</tr>' +
                    '</thead>' +
                    '<tbody>';

            for (var i = 0; i < logData.logs.length; i++) {
                var log = logData.logs[i];
                html += '<tr>' +
                    '<td class="ps-3"><i class="bi bi-journal-text me-1 text-muted"></i><strong>' + log.label + '</strong><small class="text-muted ms-1">_log</small></td>' +
                    '<td class="text-end">' + (log.today > 0 ? '<span class="badge bg-primary">' + log.today.toLocaleString() + '</span>' : '<span class="text-muted">0</span>') + '</td>' +
                    '<td class="text-end">' + (log.week > 0 ? '<span class="badge bg-success">' + log.week.toLocaleString() + '</span>' : '<span class="text-muted">0</span>') + '</td>' +
                    '<td class="text-end"><span class="badge bg-secondary">' + log.total.toLocaleString() + '</span></td>' +
                    '<td class="text-end pe-3 small text-muted">' + (log.last_at || '-') + '</td>' +
                '</tr>';
            }

            html += '</tbody></table></div>';
        }

        c.innerHTML = html;

        // ApexCharts
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/apexcharts';
        script.onload = function() { initCharts(d); };
        document.head.appendChild(script);
    }

    /**
     * Статистик картын HTML үүсгэх.
     */
    function statCard(bg, icon, value, label) {
        var num = Number(value).toLocaleString();
        return '<div class="col-sm-6 col-xl-2">' +
            '<div class="card border-0 shadow-sm h-100"><div class="card-body d-flex align-items-center">' +
                '<div class="rounded-circle ' + bg + ' bg-opacity-10 p-3 me-3">' +
                    '<i class="bi ' + icon + ' ' + bg.replace('bg-','text-') + ' fs-4"></i>' +
                '</div>' +
                '<div><div class="fs-3 fw-bold ' + bg.replace('bg-','text-') + '">' + num + '</div>' +
                '<small class="text-muted">' + label + '</small></div>' +
            '</div></div></div>';
    }

    /**
     * Өнөөдрийн pages + news нэгтгэж top 10 гаргах.
     */
    function mergeToday(pages, news, products) {
        var all = [];
        if (pages) pages.forEach(function(p) { all.push(Object.assign({_type: 'page'}, p)); });
        if (news) news.forEach(function(n) { all.push(Object.assign({_type: 'news'}, n)); });
        if (products) products.forEach(function(p) { all.push(Object.assign({_type: 'product'}, p)); });
        all.sort(function(a, b) { return b.count - a.count; });
        return all.slice(0, 10);
    }

    /**
     * Responsive хүснэгтийн HTML үүсгэх.
     */
    function buildTable(headers, items, field, badge) {
        if (!items || items.length === 0) {
            return '<div class="text-center text-muted py-3">' + (mn ? 'Мэдээлэл байхгүй' : 'No data') + '</div>';
        }
        var h = '<div class="table-responsive"><table class="table table-hover mb-0"><thead><tr>';
        h += '<th class="ps-3">' + headers[0] + '</th><th>' + headers[1] + '</th><th class="text-end pe-3">' + headers[2] + '</th></tr></thead><tbody>';
        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var val;
            var idx = (i+1);
            if (field === 'ip' || field === 'ua') {
                val = '<code class="small">' + item[field] + '</code>';
            } else {
                val = item[field];
                var flag = item.code === 'en' ? 'us' : item.code;
                var flagImg = '<img src="https://flagcdn.com/16x12/' + flag + '.png" width="16" height="12" alt="' + item.code + '">';
                if (item._type && item.id && item.id !== '0') {
                    idx = '<span class="badge bg-body-tertiary text-body-secondary">' + flagImg + ' ' + item._type + ':' + item.id + '</span>';
                } else if (item.code && item.id && item.id !== '0') {
                    idx = '<span class="badge bg-body-tertiary text-body-secondary">' + flagImg + ' ' + item.id + '</span>';
                } else if (item.code) {
                    idx = flagImg;
                }
            }
            h += '<tr><td class="ps-3 text-muted">' + idx + '</td><td>' + val + '</td>' +
                 '<td class="text-end pe-3"><span class="badge ' + badge + '">' + Number(items[i].count).toLocaleString() + '</span></td></tr>';
        }
        h += '</tbody></table></div>';
        return h;
    }

    /**
     * ApexCharts графикуудыг эхлүүлэх (area chart + donut chart).
     */
    function initCharts(d) {
        var isDark = document.body.getAttribute('data-bs-theme') === 'dark';
        new ApexCharts(document.getElementById('areaChart'), {
            chart: { type: 'area', height: 300, toolbar: { show: false }, zoom: { enabled: false }, background: 'transparent' },
            series: [{ name: mn ? 'Хандалт' : 'Visits', data: d.chart_data.map(function(r){ return r.count; }) }],
            xaxis: { categories: d.chart_data.map(function(r){ return r.date; }),
                     labels: { rotate: -45, style: { fontSize: '11px' } } },
            yaxis: { min: 0 },
            colors: ['#0d6efd'],
            fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.45, opacityTo: 0.05 } },
            dataLabels: { enabled: false },
            stroke: { curve: 'smooth', width: 2 },
            tooltip: { x: { format: 'yyyy-MM-dd' }, theme: isDark ? 'dark' : 'light' },
            grid: { borderColor: isDark ? '#374151' : '#f1f1f1' },
            theme: { mode: isDark ? 'dark' : 'light' }
        }).render();

        if (d.actions.length > 0) {
            new ApexCharts(document.getElementById('donutChart'), {
                chart: { type: 'donut', height: 300, background: 'transparent' },
                theme: { mode: isDark ? 'dark' : 'light' },
                series: d.actions.map(function(r){ return r.count; }),
                labels: d.actions.map(function(r){ return r.action; }),
                colors: ['#0d6efd','#198754','#ffc107','#dc3545','#0dcaf0','#6f42c1','#fd7e14','#20c997'],
                legend: { position: 'bottom' },
                plotOptions: { pie: { donut: { size: '55%' } } },
                dataLabels: { enabled: true, formatter: function(val){ return Math.round(val) + '%'; } }
            }).render();
        }
    }
</script>
