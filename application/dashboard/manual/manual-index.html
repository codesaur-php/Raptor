<div class="d-flex flex-wrap justify-content-between align-items-center text-uppercase rounded p-1 mb-3 shadow bg-secondary">
    <h3 class="px-2 my-auto fs-6 text-white">
        <i class="bi bi-book"></i> {{ 'manual' | text }}
    </h3>
</div>

{% if manuals is empty %}
<div class="alert alert-info">
    <i class="bi bi-info-circle"></i> {{ 'manual-not-ready'|text }}
</div>
{% else %}
<div class="row g-3">
    {% for manual in manuals %}
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm h-100 text-bg-dark">
            <div class="card-body">
                <h5 class="card-title text-capitalize">
                    <i class="bi bi-file-earmark-text"></i>
                    {{ manual.name | replace({'-': ' ', '_': ' '}) }}
                </h5>
                <div class="d-flex flex-wrap gap-2 mt-3">
                    {% for code, filename in manual.languages %}
                    <a href="{{ 'manual-view' | link({'file': filename}) }}"
                       class="btn btn-sm btn-outline-light">
                        <i class="bi bi-translate"></i> {{ code | upper }}
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
