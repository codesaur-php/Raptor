<!--
    Error Log - logs/code.log файлыг сүүлээс нь 100 мөрөөр уншиж харуулах
    ---------------------------------------------------------
    Зөвхөн system_coder (id=1) хэрэглэгчид хандах боломжтой.
-->

<div class="container-fluid py-3">
    <div class="row">
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white d-flex align-items-center justify-content-between">
                    <div>
                        <i class="bi bi-file-earmark-text me-2"></i>
                        <strong>{{ 'error-log'|text }}</strong>
                        <span class="ms-2 badge bg-secondary" id="totalInfo">{{ total_lines }} {{ 'lines'|text }}</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button id="btnRefresh" class="btn btn-sm btn-outline-light" title="{{ 'refresh'|text|e }}">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                        <button id="btnPrev" class="btn btn-sm btn-outline-light" disabled>
                            <i class="bi bi-chevron-left"></i> {{ 'older'|text }}
                        </button>
                        <span class="text-light small" id="pageInfo">-</span>
                        <button id="btnNext" class="btn btn-sm btn-outline-light" disabled>
                            {{ 'newer'|text }} <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div id="loadingArea" class="text-center py-4">
                        <div class="spinner-border spinner-border-sm text-primary"></div>
                        <span class="ms-2 text-muted">{{ 'loading'|text }}...</span>
                    </div>
                    <div id="logArea" class="d-none" style="max-height:600px; overflow:auto;">
                        <pre id="logContent" class="mb-0 p-3"
                            style="background:#1e1e2e; color:#cdd6f4; font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-all;"></pre>
                    </div>
                    <div id="emptyArea" class="d-none text-center py-4 text-muted">
                        {{ 'log-file-empty'|text }}
                    </div>
                    <div id="errorArea" class="d-none px-3 py-2">
                        <div class="alert alert-danger mb-0" id="errorMessage"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
(function() {
    var _tLines = `{{ 'lines'|text|e('js') }}`;
    var _tNetworkError = `{{ 'network-error'|text|e('js') }}`;

    var currentPage = 1;
    var totalPages = 1;

    var btnPrev = document.getElementById('btnPrev');
    var btnNext = document.getElementById('btnNext');
    var btnRefresh = document.getElementById('btnRefresh');
    var pageInfo = document.getElementById('pageInfo');
    var totalInfo = document.getElementById('totalInfo');
    var loadingArea = document.getElementById('loadingArea');
    var logArea = document.getElementById('logArea');
    var logContent = document.getElementById('logContent');
    var emptyArea = document.getElementById('emptyArea');
    var errorArea = document.getElementById('errorArea');
    var errorMessage = document.getElementById('errorMessage');

    btnPrev.addEventListener('click', function() {
        if (currentPage < totalPages) {
            currentPage++;
            loadPage();
        }
    });

    btnNext.addEventListener('click', function() {
        if (currentPage > 1) {
            currentPage--;
            loadPage();
        }
    });

    btnRefresh.addEventListener('click', function() {
        currentPage = 1;
        loadPage();
    });

    function loadPage() {
        loadingArea.classList.remove('d-none');
        logArea.classList.add('d-none');
        emptyArea.classList.add('d-none');
        errorArea.classList.add('d-none');

        fetch('{{ 'error-log-read'|link }}?page=' + currentPage)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            loadingArea.classList.add('d-none');

            if (data.status === 'error') {
                errorMessage.textContent = data.message;
                errorArea.classList.remove('d-none');
                return;
            }

            totalPages = data.total_pages;
            totalInfo.textContent = data.total_lines + ' ' + _tLines;

            if (data.lines.length === 0) {
                emptyArea.classList.remove('d-none');
                pageInfo.textContent = '-';
            } else {
                logArea.classList.remove('d-none');
                var html = '';
                for (var i = 0; i < data.lines.length; i++) {
                    var line = escapeHtml(data.lines[i]);
                    /* Алдааны мөрүүдийг тодруулах */
                    if (/\b(Fatal|Error|Exception|Warning)\b/i.test(data.lines[i])) {
                        line = '<span style="color:#f38ba8">' + line + '</span>';
                    } else if (/\b(Notice|Deprecated)\b/i.test(data.lines[i])) {
                        line = '<span style="color:#fab387">' + line + '</span>';
                    } else if (/^\[/.test(data.lines[i])) {
                        line = '<span style="color:#a6e3a1">' + line + '</span>';
                    }
                    html += line + '\n';
                }
                logContent.innerHTML = html;
                pageInfo.textContent = currentPage + ' / ' + totalPages +
                    ' (' + _tLines + ' ' + data.from_line + '-' + data.to_line + ')';
            }

            btnPrev.disabled = (currentPage >= totalPages);
            btnNext.disabled = (currentPage <= 1);
        })
        .catch(function(err) {
            loadingArea.classList.add('d-none');
            errorMessage.textContent = _tNetworkError + ': ' + err.message;
            errorArea.classList.remove('d-none');
        });
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    /* Анхны ачаалалт */
    loadPage();
})();
</script>
